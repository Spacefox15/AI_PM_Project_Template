<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>[Project Name]</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🚀 [Project Name]</h1>
    <p class="subtitle">[One-line description of what this does]</p>
  </header>

  <main>

    <!-- API Key Input -->
    <section class="card">
      <label for="apiKey">Anthropic API Key</label>
      <input
        type="password"
        id="apiKey"
        placeholder="sk-ant-..."
        autocomplete="off"
      />
      <small>Your key is never stored or sent anywhere except the Anthropic API.</small>
    </section>

    <!-- User Input -->
    <section class="card">
      <label for="userInput">[What should the user provide here?]</label>
      <textarea
        id="userInput"
        rows="6"
        placeholder="Paste your [feedback / data / ideas] here..."
      ></textarea>
    </section>

    <!-- Submit -->
    <button id="submitBtn">✨ Analyze</button>

    <!-- Loading & Error States -->
    <div id="loader" style="display:none;" aria-live="polite">Thinking...</div>
    <div id="errorMsg" class="error" style="display:none;" role="alert"></div>

    <!-- Output -->
    <section id="output"></section>

  </main>

  <footer>
    <p>Built by <a href="https://github.com/yourusername" target="_blank">Your Name</a> · 
       <a href="https://github.com/yourusername/project-name" target="_blank">View on GitHub</a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
